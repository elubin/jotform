<!DOCTYPE html>
<html>
<head>
    <script src="https://js.jotform.com/JotFormCustomWidget.min.js"></script>
</head>
<body>
    This is EAL field in an iframe - hidden on the jot page 22
    <input type="text" id="userInput" placeholder="Enter ID here..." style="width:90%; padding:8px;">
    <script type="text/javascript">

        // Initialize the widget, but only if the Jotform API is available
        if (window.JFCustomWidget) {
            JFCustomWidget.subscribe("ready", function() {
                console.log("Widget is ready and talking to Jotform!");
            });
        } else {
            console.warn("JFCustomWidget is not defined. Running outside of Jotform widget environment?");
        }


        // 1. Function to send data to any field in the main form
function sendToJotform(fieldID, value) {
    console.log("Attempting to set field " + fieldID + " to: " + value);
    
    const message = {
        action: 'setFieldValue',
        fieldID: fieldID, // The 'Unique Name' or 'ID' of the field
        value: value
    };

    // We send the message to the parent window (Jotform)
    // The "*" allows it to be received by the parent form securely
    window.parent.postMessage(message+" ~ a", "*");
    window.top.postMessage(message+" ~ b", "*");
    window.parent.postMessage(message+" ~ c", "https://form.jotform.com");
    window.top.postMessage(message+" ~ d", "https://form.jotform.com");
}

// 2. Your actual logic
document.getElementById('userInput').addEventListener('change', function() {
    const val = this.value;
    
    // Simulate your API call or logic
    console.log("Input changed to: " + val);

    // TARGET THE ADDRESS FIELDS
    // Replace 'address_city' with your actual Unique Name + _city
    sendToJotform('typeA9', '1111111111');
    sendToJotform('input_9', '22222222222');
    sendToJotform('#input_9', '333333333');
});
        
        

    </script>
</body>
</html>
